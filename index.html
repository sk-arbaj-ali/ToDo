<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep Tracks</title>
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="container">
        <p id="insert_new_item">
            <label for="new_item">Add Your Text: </label>
            <input type="text" name="new_item" id="new_item" />
            <button id="add_item_btn">Add Item</button>
        </p>
        <div id="items_list">
            <p class="list_item">
                <img src="./images/icons8-edit-64.png" alt="edit text" />
                <span class="item_text">Some text</span>
                <img src="./images/icons8-close-50.png" alt="delete item">
            </p>
        </div>
    </div>
</body>
</html>
